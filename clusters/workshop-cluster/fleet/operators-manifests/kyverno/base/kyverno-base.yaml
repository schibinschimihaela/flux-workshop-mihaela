---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno-base
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/workshop-cluster/infra/operators/kyverno/base
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m0s
  wait: true
  healthChecks:
    - apiVersion: v1
      kind: Namespace
      name: kyverno-operator
