---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: operators-sync
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/workshop-cluster/fleet/operators-manifests
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-sync
  timeout: 10m0s
  wait: true
