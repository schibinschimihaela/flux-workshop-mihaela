---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno-overlays
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/workshop-cluster/infra/operators/kyverno/overlays
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: kyverno-core
  timeout: 5m0s
  wait: true
