---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: space-app
  namespace: demo-app
spec:
  interval: 1m
  timeout: 5m0s
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: space-app
      # Workshop: bump to 2.0.0 / 3.0.0 in git and watch Flux reconcile.
      version: "1.0.0"
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: space-app-charts
        namespace: flux-system
      interval: 30s
  values:
    config:
      greeting: "Hello from GitOps!"
      themeAccent: "#ffd166"
    secret:
      # Empty in v1/v2. Set a non-empty value on v3 to unlock premium.
      apiToken: ""
