---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: demo-app-core
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./apps/demo-app/core
  prune: false
  force: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: demo-app-base
  timeout: 5m0s
  wait: true